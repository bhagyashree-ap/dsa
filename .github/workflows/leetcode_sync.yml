name: Pure Code LeetCode Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" 

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install API Handler
        run: pip install requests

      - name: Download LeetCode Code
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
        run: python sync_leetcode.py

      - name: Deploy Code Updates
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add solutions/
          if git diff --staged --quiet; then
            echo "No new solutions to sync."
          else
            git commit -m "Sync LeetCode solution [Clean Code]"
            git push
          fi
